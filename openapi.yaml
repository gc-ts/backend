openapi: 3.0.3
info:
  title: HR Agent AI — Backend API
  version: "1.1.0"
  description: |
    Backend для AI-ассистента «Техна» по HR-вопросам компании 1221 Системс.
    Полностью локальная архитектура: Node.js/Express + PostgreSQL + Ollama
    (qwen2.5:32b для генерации, bge-m3 для эмбеддингов) + локальный
    RAG-индекс по ЛНА (ПВТР, положения, инструкции).

    ## Аутентификация и роли

    Все защищённые эндпоинты принимают JWT в заголовке `Authorization: Bearer <token>`.
    JWT выдаётся `POST /api/auth/login` и содержит поле `role`:
      * `employee` — обычный сотрудник;
      * `admin` — администратор.

    Тестовые учётки:
      * `admin / admin` — администратор;
      * `12345 / password123` (Потапов), `67890 / password123` (Иванова),
        `11111 / password123` (Петров) — обычные сотрудники.

    ## Матрица доступа

    | Эндпоинт                              | Аноним | Сотрудник                | Админ |
    | ------------------------------------- | ------ | ------------------------ | ----- |
    | `GET  /health`                        |  ✅    |  ✅                      |  ✅    |
    | `POST /api/auth/register`             |  ✅    |  ✅                      |  ✅    |
    | `POST /api/auth/login`                |  ✅    |  ✅                      |  ✅    |
    | `POST /api/auth/verify`               |  ❌    |  ✅                      |  ✅    |
    | `POST /api/employee/auth`             |  ✅    |  ✅                      |  ✅    |
    | `GET  /api/employee/{id}`             |  ❌    |  только свой `id`        |  любой `id` |
    | `GET  /api/employee/{id}/vacation`    |  ❌    |  только свой `id`        |  любой `id` |
    | `GET  /api/employee/{id}/birthday`    |  ❌    |  только свой `id`        |  любой `id` |
    | `GET  /api/employee/search/by-name`   |  ❌    |  ✅                      |  ✅    |
    | `POST /api/chat/message`              |  ❌    |  ✅ (от своего имени)    |  ✅ (можно указать `employeeId`) |
    | `POST /api/chat/stream`                |  ❌    |  ✅ (от своего имени)    |  ✅ (можно указать `employeeId`) |
    | `GET  /api/chat/history/{employeeId}` |  ❌    |  только свой `employeeId`|  любой `employeeId` |
    | `GET  /api/documents`                 |  ❌    |  ✅                      |  ✅    |
    | `GET  /api/documents/{id}`            |  ❌    |  ✅                      |  ✅    |
    | `GET  /api/documents/meta/categories` |  ❌    |  ✅                      |  ✅    |
    | `POST /api/documents/upload`          |  ❌    |  ❌ (403)               |  ✅ (admin only) |
    | `DELETE /api/documents/{id}`          |  ❌    |  ❌ (403)               |  ✅ (admin only) |
    | `GET  /api/knowledge`                 |  ❌    |  ✅                      |  ✅    |
    | `GET  /api/knowledge/index`           |  ❌    |  ✅                      |  ✅    |
    | `POST /api/knowledge/search`          |  ❌    |  ✅                      |  ✅    |
    | `POST /api/knowledge/reindex`         |  ❌    |  ❌ (403)               |  ✅ (admin only) |
    | `GET  /api/knowledge/corporate-sync`  |  ❌    |  ❌ (403)               |  ✅ (admin only) |
    | `POST /api/knowledge/sync-corporate`  |  ❌    |  ❌ (403)               |  ✅ (admin only) |

    Возможности:
      * Идентификация сотрудника по табельному номеру / e-mail.
      * Чат с ответами, обоснованными цитатами из загруженных документов.
      * Стриминг ответа через Server-Sent Events.
      * Загрузка PDF/DOCX/TXT с автоматической индексацией в векторное хранилище.
      * История диалога, реквизиты сотрудника, графики отпусков.
  contact:
    name: HR Department
    email: hr@company.ru
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local dev

tags:
  - name: System
    description: Здоровье сервиса. Без авторизации.
  - name: Auth
    description: Регистрация, логин (выдача JWT), проверка токена.
  - name: Chat
    description: |
      Все эндпоинты требуют JWT. `employeeId` для обычного юзера всегда берётся
      из токена; админ может явно указать чужой `employeeId` в body/URL.
  - name: Employee
    description: |
      Все эндпоинты `/{id}` доступны только владельцу записи.
      Админ имеет доступ к любому `id` без 403.
  - name: Documents
    description: |
      Чтение доступно любому авторизованному. Загрузка и удаление — только админ.
  - name: Knowledge
    description: |
      Поиск и просмотр индекса — любой авторизованный. Переиндексация — только админ.

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [System]
      summary: Состояние сервиса, Ollama и RAG-индекса
      security: []
      responses:
        "200":
          description: OK / degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Регистрация сотрудника (с паролем)
      description: |
        Публичный. Создаёт обычного сотрудника (`role = employee`).
        Создание администраторов через этот эндпоинт не предусмотрено.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  employee: { $ref: "#/components/schemas/EmployeeDB" }
        "400":
          $ref: "#/components/responses/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Логин по e-mail/табельному + пароль (выдаёт JWT)
      description: |
        Публичный. Возвращает JWT с полями `id`, `employeeId`, `email`, `role`.

        Тестовые логины:
          * `admin / admin` → role = `admin`
          * `12345 / password123` → role = `employee`
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login: { type: string, example: "admin" }
                password: { type: string, example: "admin" }
            examples:
              admin:
                summary: Админ
                value: { login: "admin", password: "admin" }
              employee:
                summary: Обычный сотрудник
                value: { login: "12345", password: "password123" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  employee: { $ref: "#/components/schemas/EmployeeDB" }
        "401":
          $ref: "#/components/responses/Error"

  /api/auth/verify:
    post:
      tags: [Auth]
      summary: Проверка JWT-токена
      description: Требует валидный JWT. Возвращает декодированный payload.
      responses:
        "200":
          description: Токен валиден
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  user:
                    type: object
                    properties:
                      id:         { type: integer }
                      employeeId: { type: string }
                      email:      { type: string }
                      role:       { type: string, enum: [employee, admin] }
        "401":
          $ref: "#/components/responses/Error"

  /api/chat/message:
    post:
      tags: [Chat]
      summary: Задать вопрос ассистенту (синхронный ответ)
      description: |
        **Требует JWT.**

        Извлекает релевантные фрагменты из RAG, подмешивает данные сотрудника
        и историю диалога, генерирует ответ на qwen2.5:32b.

        * **Сотрудник:** `employeeId` всегда берётся из токена, поле `employeeId`
          в body **игнорируется**. Чат ведётся от имени самого пользователя.
        * **Админ:** может передать `employeeId` в body и задавать вопросы
          «от имени» этого сотрудника (история и контекст подтянутся для него).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            examples:
              vacation:
                summary: «Сколько у меня дней отпуска?» (любой авторизованный)
                value:
                  message: "Сколько у меня осталось дней отпуска?"
              admin_for_user:
                summary: Админ задаёт вопрос от имени сотрудника 12345
                value:
                  message: "Какой у меня график отпусков?"
                  employeeId: "12345"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }

  /api/chat/stream:
    post:
      tags: [Chat]
      summary: Тот же ответ, но потоком через Server-Sent Events
      description: |
        **Требует JWT.** Те же правила по `employeeId`, что и `/api/chat/message`:
        обычный юзер пишет от себя, админ может указать `employeeId` в body.

        Возвращает поток `text/event-stream`. Тело каждого события — JSON одного из видов:
          * `{"type":"context","source":"...","hits":[...]}` — однократно в начале
          * `{"type":"token","delta":"..."}` — токены ответа
          * `{"type":"done"}` — конец стрима
          * `{"type":"error","error":"..."}` — ошибка
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE-поток
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"type":"context","source":"ПВТР, п. 7.6","hits":[]}

                  data: {"type":"token","delta":"У вас "}

                  data: {"type":"token","delta":"14 дней."}

                  data: {"type":"done"}
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }

  /api/chat/history/{employeeId}:
    get:
      tags: [Chat]
      summary: История чата сотрудника
      description: |
        **Требует JWT.**
        * Сотрудник: только свой `employeeId`, иначе 403.
        * Админ: любой `employeeId`.
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChatHistoryItem"
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /api/employee/{id}:
    get:
      tags: [Employee]
      summary: Карточка сотрудника по табельному номеру
      description: |
        **Требует JWT.**
        * Сотрудник: разрешён только свой `id` (иначе 403).
        * Админ: любой `id`.
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeePublic"
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /api/employee/{id}/vacation:
    get:
      tags: [Employee]
      summary: Остаток отпуска и график
      description: |
        **Требует JWT.**
        * Сотрудник: только свой `id`.
        * Админ: любой `id`.
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VacationInfo"
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /api/employee/{id}/birthday:
    get:
      tags: [Employee]
      summary: Дата рождения и возраст
      description: |
        **Требует JWT.**
        * Сотрудник: только свой `id`.
        * Админ: любой `id`.
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  birthDate: { type: string, format: date, nullable: true }
                  age: { type: integer, nullable: true }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /api/employee/auth:
    post:
      tags: [Employee]
      summary: Лёгкая идентификация по табельному/e-mail (без пароля)
      description: |
        Публичный, без JWT. Возвращает opaque-токен (не JWT) для UX-сценария
        «вспомнить пользователя на этом устройстве». Никаких прав не выдаёт —
        для боевых вызовов используйте `POST /api/auth/login`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                employeeId: { type: string, example: "12345" }
                email: { type: string, example: "a.potapov@company.ru" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  employee: { $ref: "#/components/schemas/EmployeePublic" }
        "404": { $ref: "#/components/responses/Error" }

  /api/employee/search/by-name:
    get:
      tags: [Employee]
      summary: Поиск сотрудника по ФИО
      description: |
        **Требует JWT** (любая роль). Используется для вопросов вида
        «когда день рождения <имя коллеги>». Не отдаёт паролей/zarplata-полей.
      parameters:
        - in: query
          name: name
          required: true
          schema: { type: string }
          example: "Иванова"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items: { $ref: "#/components/schemas/EmployeePublic" }
        "401": { $ref: "#/components/responses/Error" }

  /api/documents:
    get:
      tags: [Documents]
      summary: Список документов
      description: "**Требует JWT** (любая роль)."
      parameters:
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items: { $ref: "#/components/schemas/Document" }
        "401": { $ref: "#/components/responses/Error" }

  /api/documents/{id}:
    get:
      tags: [Documents]
      summary: Документ по id
      description: "**Требует JWT** (любая роль)."
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [Documents]
      summary: Удалить документ (вместе с чанками RAG) — admin only
      description: "**Только admin.** Обычный сотрудник получит 403."
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  removedChunks: { type: integer }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /api/documents/upload:
    post:
      tags: [Documents]
      summary: Загрузка нового документа (PDF/DOCX/TXT/MD) — admin only
      description: |
        **Только admin.** Загружает файл, парсит, индексирует в RAG и сохраняет
        метаданные в БД. Обычный сотрудник получит 403.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                title:    { type: string, example: "Положение о премировании" }
                category: { type: string, example: "Заработная плата" }
                type:     { type: string, example: "ЛНА" }
      responses:
        "201":
          description: Загружен и проиндексирован
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Document"
                  - type: object
                    properties:
                      chunkCount: { type: integer, example: 17 }
                      message:    { type: string }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /api/documents/meta/categories:
    get:
      tags: [Documents]
      summary: Список категорий
      description: "**Требует JWT** (любая роль)."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items: { type: string }
        "401": { $ref: "#/components/responses/Error" }

  /api/knowledge:
    get:
      tags: [Knowledge]
      summary: Базовая «быстрая» KB + статистика RAG-индекса
      description: "**Требует JWT** (любая роль)."
      responses:
        "200":
          description: OK
        "401": { $ref: "#/components/responses/Error" }

  /api/knowledge/search:
    post:
      tags: [Knowledge]
      summary: Поиск по базе знаний (вектор + keyword fallback)
      description: "**Требует JWT** (любая роль)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:    { type: string, example: "перенос отпуска" }
                topK:     { type: integer, default: 4 }
                minScore: { type: number,  default: 0.35 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      title:   { type: string }
                      content: { type: string }
                      source:  { type: string }
                  hits:
                    type: array
                    items: { $ref: "#/components/schemas/RagHit" }
        "401": { $ref: "#/components/responses/Error" }

  /api/knowledge/reindex:
    post:
      tags: [Knowledge]
      summary: Принудительная переиндексация папки RAG_DOCS_DIR — admin only
      description: "**Только admin.** Обычный сотрудник получит 403."
      responses:
        "200":
          description: Готово
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:  { type: string }
                  indexed:  { type: integer }
                  chunks:   { type: integer }
                  total:    { type: integer }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /api/knowledge/sync-corporate:
    post:
      tags: [Knowledge]
      summary: Принудительная синхронизация WordPress-портала — admin only
      description: "**Только admin.** Подтягивает сотрудников и записи портала, затем обновляет RAG-индекс."
      responses:
        "200":
          description: Готово
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:  { type: string }
                  skipped:  { type: boolean }
                  reason:   { type: string }
                  users:    { type: integer }
                  posts:    { type: integer }
                  chunks:   { type: integer }
                  lastSync: { type: string, format: date-time }
                  total:    { type: integer }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /api/knowledge/corporate-sync:
    get:
      tags: [Knowledge]
      summary: Состояние расписания синхронизации WordPress-портала — admin only
      description: "**Только admin.** Возвращает настройку, статус выполнения и ближайшее обновление."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured: { type: boolean }
                  running:    { type: boolean }
                  lastSync:   { type: string, nullable: true }
                  nextSync:   { type: string, nullable: true }
                  schedule:   { type: string, example: "18:00 Europe/Moscow" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /api/knowledge/index:
    get:
      tags: [Knowledge]
      summary: Состояние векторного индекса
      description: "**Требует JWT** (любая роль)."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: object
                    properties:
                      total: { type: integer }
                      byDocument:
                        type: object
                        additionalProperties: { type: integer }
                  documents:
                    type: array
                    items:
                      type: object
                      properties:
                        id:         { type: string }
                        title:      { type: string }
                        type:       { type: string }
                        category:   { type: string }
                        sourcePath: { type: string }
                        chunkCount: { type: integer }
        "401": { $ref: "#/components/responses/Error" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    EmployeeId:
      in: path
      name: id
      required: true
      schema: { type: string }
      example: "12345"
      description: |
        Табельный номер. Обычный сотрудник может указывать только собственный
        `employeeId` (иначе 403). Админ — любой существующий.

  responses:
    Error:
      description: Ошибка
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      properties:
        error:   { type: string }
        message: { type: string }

    Health:
      type: object
      properties:
        status:    { type: string, enum: [ok, degraded] }
        timestamp: { type: string, format: date-time }
        ollama:
          type: object
          properties:
            ok:                    { type: boolean }
            host:                  { type: string }
            chatModel:             { type: string }
            embedModel:            { type: string }
            chatModelAvailable:    { type: boolean }
            embedModelAvailable:   { type: boolean }
            models:
              type: array
              items: { type: string }
        database:  { type: string, enum: [connected, disconnected] }
        rag:
          type: object
          properties:
            total: { type: integer }
            byDocument:
              type: object
              additionalProperties: { type: integer }

    RegisterRequest:
      type: object
      required: [employeeId, email, password, fullName]
      properties:
        employeeId: { type: string, example: "12345" }
        email:      { type: string, example: "a.potapov@company.ru" }
        password:   { type: string, example: "password123" }
        fullName:   { type: string, example: "Потапов Артем Павлович" }
        position:   { type: string, example: "Senior Developer" }
        department: { type: string, example: "IT" }
        birthDate:  { type: string, format: date, example: "1990-05-20" }
        hireDate:   { type: string, format: date, example: "2020-01-15" }
        phone:      { type: string, example: "+7 (999) 123-45-67" }

    EmployeeDB:
      type: object
      properties:
        id:           { type: integer }
        employee_id:  { type: string }
        email:        { type: string }
        full_name:    { type: string }
        position:     { type: string }
        department:   { type: string }
        birth_date:   { type: string, format: date, nullable: true }
        hire_date:    { type: string, format: date, nullable: true }
        phone:        { type: string, nullable: true }
        vacation_days:{ type: integer }
        role:         { type: string, enum: [employee, admin], example: "employee" }
        created_at:   { type: string, format: date-time }

    EmployeePublic:
      type: object
      properties:
        id:           { type: string, example: "12345" }
        fullName:     { type: string, example: "Потапов Артем Павлович" }
        position:     { type: string }
        department:   { type: string }
        email:        { type: string }
        phone:        { type: string }
        hireDate:     { type: string, format: date, nullable: true }
        birthDate:    { type: string, format: date, nullable: true }
        vacationDays: { type: integer }
        nextVacation: { type: string, format: date, nullable: true }
        salary:       { type: integer, nullable: true }

    VacationInfo:
      type: object
      properties:
        remainingDays: { type: integer }
        nextVacation:  { type: string, format: date, nullable: true }
        vacationSchedule:
          type: array
          items:
            type: object
            properties:
              startDate: { type: string, format: date }
              endDate:   { type: string, format: date, nullable: true }
              days:      { type: integer }
              status:    { type: string, example: "planned" }

    ChatRequest:
      type: object
      required: [message]
      properties:
        message:    { type: string, example: "Сколько у меня осталось дней отпуска?" }
        employeeId:
          type: string
          example: "12345"
          description: |
            Игнорируется для обычного сотрудника (`employeeId` всегда берётся из JWT).
            Админ может указать чужой `employeeId`, чтобы вести чат от имени сотрудника.

    RagHit:
      type: object
      properties:
        score:    { type: number, example: 0.66 }
        doc:      { type: string, example: "Правила внутреннего трудового распорядка" }
        section:  { type: string, example: "п. 7.6" }

    ChatResponse:
      type: object
      properties:
        response:  { type: string }
        source:    { type: string, nullable: true }
        hits:
          type: array
          items: { $ref: "#/components/schemas/RagHit" }
        timestamp: { type: string, format: date-time }

    ChatHistoryItem:
      type: object
      properties:
        id:        { type: string }
        role:      { type: string, enum: [user, assistant] }
        content:   { type: string }
        timestamp: { type: string, format: date-time }

    Document:
      type: object
      properties:
        id:          { type: string }
        title:       { type: string }
        type:        { type: string }
        category:    { type: string }
        uploadDate:  { type: string, nullable: true }
        fileUrl:     { type: string }
        chunkCount:  { type: integer, nullable: true }
        indexed:     { type: boolean, nullable: true }
